<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#06140a">
  <title>Бильярд Мастер</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ============ СПЛЭШ-ЭКРАН ЗАГРУЗКИ ============ -->
  <div id="splashScreen" class="screen">
    <div class="splash-bg"></div>
    <div class="splash-bg glow"></div>
    <div class="splash-content">
      <div class="splash-logo">
        <div class="splash-ball spin"></div>
        <div class="splash-title">БИЛЬЯРД<br><span>МАСТЕР</span></div>
      </div>
      <div class="loading-bar-wrap"><div class="loading-bar" id="loadingBar"></div></div>
      <div class="loading-percent" id="loadingPercent">0%</div>
      <div class="loading-status" id="loadingStatus">Загрузка assets…</div>
    </div>
  </div>

  <!-- ============ ИГРОВОЙ КАНВАС ============ -->
  <div id="game"><canvas id="cv"></canvas></div>

  <!-- ============ HUD ============ -->
  <div id="hud" class="hud hidden">
    <div class="hud-inner">
      <div class="hud-left">
        <button class="hbtn icon-btn" id="pauseBtn" aria-label="Пауза">
          <svg viewBox="0 0 24 24" class="ic"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
        </button>
        <button class="hbtn icon-btn" id="musicBtn" aria-label="Музыка">
          <svg viewBox="0 0 24 24" class="ic music-on"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
          <svg viewBox="0 0 24 24" class="ic music-off hidden"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/><path d="M4 4l16 16" stroke="currentColor" stroke-width="2.2" fill="none"/></svg>
        </button>
      </div>

      <div class="hud-stats">
        <div class="hbox"><span class="ic-lvl"></span><span id="lvlNum">1</span></div>
        <div class="hbox"><span class="ball-mini"></span><span id="ballCount">0</span></div>
        <div class="hbox target-type hidden" id="targetTypeBadge"><span class="tt-icon" id="ttIcon"></span><span id="ttText">Все</span></div>
        <div class="hbox" id="comboBadge"><span class="ic-combo"></span>×<span id="comboNum">1</span></div>
        <div class="hbox timer hidden" id="timerDisplay"><svg viewBox="0 0 24 24" class="ic"><path d="M12 20a8 8 0 1 1 0-16 8 8 0 0 1 0 16zm1-13h-2v6l4 2 1-1.7-3-1.8z"/></svg><span id="timerNum">0</span></div>
      </div>

      <div class="hbox coin" id="coinDisplay">
        <span class="ic-coin"></span><span id="coins">0</span>
      </div>
    </div>
  </div>

  <!-- ============ ШКАЛА СИЛЫ ============ -->
  <div id="powerWrap"><div id="powerBar"></div></div>
  <div id="hint" class="hint hidden">Тяни от белого шара для удара</div>

  <!-- ============ МЕНЮ ПАУЗЫ ============ -->
  <div class="overlay hidden" id="pauseMenu">
    <div class="panel">
      <h2 class="panel-title">Пауза</h2>
      <button class="btn" id="resumeBtn"><svg viewBox="0 0 24 24" class="ic"><path d="M8 5v14l11-7z"/></svg>Продолжить</button>
      <button class="btn btn-shop" id="pauseShopBtn"><svg viewBox="0 0 24 24" class="ic"><path d="M3 5h2l2 12h11l2-9H6"/><circle cx="9" cy="20" r="1.5"/><circle cx="17" cy="20" r="1.5"/></svg>Магазин</button>
      <button class="btn btn-back" id="pauseMenuBtn"><svg viewBox="0 0 24 24" class="ic"><path d="M10 19l-7-7 7-7v4h11v6H10z"/></svg>В меню</button>
    </div>
  </div>

  <!-- ============ ГЛАВНОЕ МЕНЮ ============ -->
  <div class="overlay hidden" id="mainMenu">
    <div class="menu-bg"></div>
    <div class="menu-content">
      <div class="menu-logo">
        <div class="logo-ball spin"><span>8</span></div>
        <h1>Бильярд<br><span class="accent">Мастер</span></h1>
      </div>
      <p class="sub">Забивай шары, собирай комбо, прокачивай кий,<br>полотна и наборы шаров!</p>
      <div class="menu-progress">
        <div class="prog-stars">
          <span class="star-mini"></span><span id="totalStars">0</span>
          <span class="sep">/</span>
          <span id="totalStarsMax">0</span>
        </div>
        <div class="prog-coins">
          <span class="ic-coin"></span><span id="menuCoins">0</span>
        </div>
      </div>
      <div class="menu-buttons">
        <button class="btn btn-primary" id="playBtn">
          <svg viewBox="0 0 24 24" class="ic"><path d="M8 5v14l11-7z"/></svg>
          Играть — Уровень <span id="menuLevel">1</span>
        </button>
        <button class="btn btn-shop" id="shopBtn">
          <svg viewBox="0 0 24 24" class="ic"><path d="M3 5h2l2 12h11l2-9H6"/><circle cx="9" cy="20" r="1.5"/><circle cx="17" cy="20" r="1.5"/></svg>
          Магазин
        </button>
      </div>
    </div>
  </div>

  <!-- ============ МАГАЗИН ============ -->
  <div class="overlay hidden" id="shop">
    <div class="shop-content">
      <h2 class="panel-title">Магазин</h2>
      <div class="shop-coins"><span class="ic-coin"></span><span id="shopCoins">0</span></div>
      <div class="tabs">
        <div class="tab active" data-tab="cue"><svg viewBox="0 0 24 24" class="ic"><path d="M2 22l12-12-2-2L0 20z M14 8l6-6 4 4-6 6z"/></svg>Кии</div>
        <div class="tab" data-tab="cloth"><svg viewBox="0 0 24 24" class="ic"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 12h20" stroke-dasharray="3 3"/></svg>Полотна</div>
        <div class="tab" data-tab="ball"><svg viewBox="0 0 24 24" class="ic"><circle cx="12" cy="12" r="9"/></svg>Шары</div>
      </div>
      <div class="scroll" id="shopList"></div>
      <button class="btn btn-back" id="shopBack"><svg viewBox="0 0 24 24" class="ic"><path d="M10 19l-7-7 7-7v4h11v6H10z"/></svg>Назад</button>
    </div>
  </div>

  <!-- ============ ЭКРАН ОКОНЧАНИЯ УРОВНЯ ============ -->
  <div class="overlay hidden" id="levelEnd">
    <div class="panel result-panel">
      <h2 id="leTitle" class="panel-title">Уровень пройден!</h2>
      <div class="result-stars" id="leStars"></div>
      <div class="result-rewards" id="leRewards"></div>
      <div class="result-buttons">
        <button class="btn btn-primary" id="nextBtn">Дальше</button>
        <button class="btn btn-back" id="leMenu">Меню</button>
      </div>
    </div>
  </div>

  <!-- ============ ЭКРАН СТАРТА УРОВНЯ ============ -->
  <div class="overlay hidden" id="levelStart">
    <div class="panel start-panel">
      <h2 id="lsTitle" class="panel-title">Уровень 1</h2>
      <div class="start-goal" id="lsGoal"></div>
      <div class="result-buttons">
        <button class="btn btn-primary" id="startBtn">Начать</button>
        <button class="btn btn-back" id="lsMenu">Меню</button>
      </div>
    </div>
  </div>

  <!-- ============ ТОСТ-СООБЩЕНИЯ ============ -->
  <div id="toast" class="toast"></div>
  <div id="comboFlyout" class="combo-flyout"></div>

  <!-- ============ СКРИПТЫ (порядок важен — без зависимостей) ============ -->
  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/levels.js"></script>
  <script src="js/physics.js"></script>
  <script src="js/ballart.js"></script>
  <script src="js/render.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
